    <rect x="394" y="118" width="160" height="96" rx="12" fill="url(#panel)" stroke="#d9e1e8" stroke-width="2"/>
    <rect x="166" y="330" width="160" height="96" rx="12" fill="url(#panel)" stroke="#d9e1e8" stroke-width="2"/>
    <rect x="394" y="330" width="160" height="96" rx="12" fill="url(#panel)" stroke="#d9e1e8" stroke-width="2"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#14213d">
