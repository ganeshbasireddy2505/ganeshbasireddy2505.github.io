<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Cloud platform architecture illustration</title>
  <desc id="desc">A structured cloud platform with CI/CD, Kubernetes, Terraform, monitoring, and security components.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#14213d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="720" height="560" rx="24" fill="#f7f4ef"/>
  <path d="M96 384c-34 0-61-27-61-61 0-30 22-56 52-60 9-63 63-111 128-111 43 0 81 21 105 53 18-12 39-19 62-19 55 0 101 40 110 92 50 5 89 47 89 98 0 54-44 98-98 98H96z" fill="#dff1ed"/>
