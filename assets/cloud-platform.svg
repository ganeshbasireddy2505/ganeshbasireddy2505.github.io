    <text x="246" y="184" font-size="15" text-anchor="middle" fill="#5f6b7a">Cloud Build</text>
    <text x="474" y="154" font-size="20" text-anchor="middle">Kubernetes</text>
    <text x="474" y="184" font-size="15" text-anchor="middle" fill="#5f6b7a">GKE / EKS</text>
